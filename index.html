<style>
  :root{
    --ink:#EFEDE8;--dim:#9a978f;--faint:#5c5a55;--bg:#101114;--card:#191b1f;
    --card2:#20232a;--rule:#2b2e35;--red:#E63946;--reddim:#7a2530;
    --hot:#E63946;--warm:#E0A62E;--cool:#5C8AA6;
    --booked:#3FA66A;--hold:#C88A3C;--lost:#6b6b6b;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,sans-serif;
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);}
  .wrap{max-width:640px;margin:0 auto;padding:16px 14px 90px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px;}
  h1{font-family:Georgia,serif;font-size:22px;margin:0;}
  .synced{display:flex;align-items:center;gap:6px;font-family:ui-monospace,monospace;font-size:10.5px;color:var(--dim);
    background:var(--card);border:1px solid var(--rule);border-radius:20px;padding:5px 10px;cursor:pointer;}
  .syncdot{width:7px;height:7px;border-radius:50%;background:var(--faint);}
  .syncdot.ok{background:var(--booked);} .syncdot.busy{background:var(--warm);} .syncdot.err{background:var(--red);}
  .sub{color:var(--dim);font-size:12px;font-family:ui-monospace,monospace;margin:2px 0 14px;}

  .searchbar{position:relative;margin-bottom:12px;}
  .searchbar input{width:100%;box-sizing:border-box;background:var(--card);border:1px solid var(--rule);
    color:var(--ink);border-radius:9px;padding:10px 34px 10px 12px;font-size:14px;outline:none;}
  .searchbar input:focus{border-color:var(--red);}
  .searchbar #searchClear{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;
    border:none;color:var(--dim);font-size:20px;line-height:1;padding:4px 8px;cursor:pointer;display:none;}
  .searchbar.has #searchClear{display:block;}
  .stat{cursor:pointer;transition:border-color .12s;}
  .stat.on{border-color:var(--red);}
  .stat{position:relative;}
  .stat.alert{border-color:var(--red);box-shadow:0 0 0 1px var(--red) inset;animation:newpulse 1.6s ease-in-out infinite;}
  @keyframes newpulse{0%,100%{box-shadow:0 0 0 1px var(--red) inset;}50%{box-shadow:0 0 0 2px var(--red) inset;}}
  .stat .bell{position:absolute;top:-6px;right:-6px;min-width:16px;height:16px;padding:0 4px;border-radius:9px;
    background:var(--red);color:#fff;font-size:10px;font-weight:700;line-height:16px;text-align:center;
    box-shadow:0 0 0 2px var(--bg,#15171c);font-family:ui-monospace,monospace;}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
  .stat{background:var(--card);border:1px solid var(--rule);border-radius:9px;padding:9px 6px;text-align:center;}
  .stat .n{font-family:ui-monospace,monospace;font-size:19px;font-weight:600;}
  .stat .l{font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}

  .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;-webkit-overflow-scrolling:touch;}
  .chip{flex:0 0 auto;background:var(--card);border:1px solid var(--rule);color:var(--dim);
    font-family:ui-monospace,monospace;font-size:12px;padding:7px 12px;border-radius:20px;cursor:pointer;white-space:nowrap;}
  .chip.on{background:var(--red);border-color:var(--red);color:#fff;}
  .chip .c{font-size:10px;opacity:.8;margin-left:4px;}

  .lead{background:var(--card);border:1px solid var(--rule);border-radius:10px;margin-bottom:10px;overflow:hidden;}
  .lead.due{border-left:3px solid var(--red);}
  .lhead{display:flex;align-items:center;gap:10px;padding:12px 13px;cursor:pointer;}
  .tierdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
  .lname{flex:1;min-width:0;font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .spill{font-family:ui-monospace,monospace;font-size:9.5px;padding:3px 7px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;}
  .srcbadge{font-family:ui-monospace,monospace;font-size:9px;padding:3px 7px;border-radius:20px;text-transform:uppercase;
    letter-spacing:.04em;flex-shrink:0;background:#2563EB22;color:#5B9BFF;border:1px solid #2563EB66;}
  .lmeta{padding:0 13px 11px;font-size:12px;color:var(--dim);display:flex;flex-wrap:wrap;gap:4px 12px;}
  .lmeta .due{color:var(--red);font-weight:600;}
  .lmeta .party{width:100%;color:var(--ink);opacity:.85;}

  .edit{border-top:1px solid var(--rule);padding:12px 13px;background:var(--card2);display:none;}
  .lead.open .edit{display:block;}
  .row2{display:flex;gap:8px;margin-bottom:9px;}
  .fld{flex:1;}
  .fld label{display:block;font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;}
  input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--rule);border-radius:7px;color:var(--ink);
    font-size:14px;padding:9px;outline:none;font-family:inherit;}
  input:focus,select:focus,textarea:focus{border-color:var(--red);}
  textarea{resize:vertical;min-height:38px;}
  .actrow{display:flex;gap:8px;margin-top:4px;flex-wrap:wrap;}
  .btn{flex:1;border:none;border-radius:8px;padding:11px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;min-width:90px;}
  .btn.wa{background:#25D366;color:#062b14;text-align:center;text-decoration:none;line-height:1.4;}
  .btn.touch{background:var(--red);color:#fff;}
  .btn.del{background:transparent;border:1px solid var(--reddim);color:var(--red);flex:0 0 auto;min-width:44px;}
  .btn.ghost{background:var(--card);border:1px solid var(--rule);color:var(--dim);}
  .btn.done{background:var(--card2);border:1px solid var(--red);color:var(--red);}
  .btn.save{background:var(--booked);color:#052a15;}

  .add{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(18px + env(safe-area-inset-bottom));
    background:var(--red);color:#fff;border:none;border-radius:30px;padding:14px 26px;font-size:15px;font-weight:600;
    box-shadow:0 6px 20px rgba(0,0,0,.5);cursor:pointer;z-index:20;}
  .empty{text-align:center;color:var(--dim);font-size:13.5px;padding:30px 16px;border:1px dashed var(--rule);border-radius:10px;line-height:1.5;}
  .flag{position:fixed;bottom:80px;right:16px;font-family:ui-monospace,monospace;font-size:10.5px;color:var(--dim);
    background:var(--card2);border:1px solid var(--rule);padding:6px 10px;border-radius:6px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:30;}
  .flag.show{opacity:1;}

  /* settings sheet */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;z-index:40;align-items:flex-end;justify-content:center;}
  .overlay.on{display:flex;}
  .sheet{background:var(--card);border-top-left-radius:16px;border-top-right-radius:16px;width:100%;max-width:640px;
    padding:20px 16px calc(24px + env(safe-area-inset-bottom));border-top:1px solid var(--rule);max-height:88vh;overflow-y:auto;}
  .sheet h2{font-family:Georgia,serif;font-size:19px;margin:0 0 4px;}
  .sheet p{color:var(--dim);font-size:12.5px;line-height:1.5;margin:0 0 14px;}
  .sheet .fld{margin-bottom:12px;}
  .sheet .actrow{margin-top:8px;}
  .statusline{font-family:ui-monospace,monospace;font-size:11.5px;color:var(--dim);margin-top:10px;min-height:16px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>Trigger Ready CRM</h1>
    <div class="synced" id="syncBtn"><span class="syncdot" id="syncDot"></span><span id="syncTxt">Local only</span></div>
  </div>
  <div class="sub" id="sub">Lead pipeline</div>

  <div class="searchbar">
    <input id="searchBox" type="search" placeholder="Search name, phone, party, quote..." autocomplete="off">
    <button id="searchClear" type="button" title="Clear">&times;</button>
  </div>
  <div class="stats" id="stats"></div>
  <div class="chips" id="chips"></div>
  <div id="list"></div>
</div>

<button class="add" id="addBtn">+ Add lead</button>
<div class="flag" id="flag">saved</div>

<div class="overlay" id="overlay">
  <div class="sheet">
    <h2>Google Sheets sync</h2>
    <p>Paste the Web App URL and secret from your Apps Script deployment (setup guide came with this file). Once connected, leads save to your Sheet and sync across devices. Leave blank to stay local-only.</p>
    <div class="fld"><label>Web App URL</label><input id="cfgUrl" placeholder="https://script.google.com/macros/s/..../exec"></div>
    <div class="fld"><label>Secret token</label><input id="cfgToken" placeholder="must match the TOKEN in your script"></div>
    <div class="actrow">
      <button class="btn touch" id="cfgSave">Save & connect</button>
      <button class="btn ghost" id="cfgPull">Pull from Sheet</button>
    </div>
    <div class="actrow">
      <button class="btn ghost" id="cfgClose">Close</button>
    </div>
    <div class="statusline" id="cfgStatus"></div>
  </div>
</div>

<script>
const LKEY="tr-crm-leads", CKEY="tr-crm-config";
const uid=()=>Math.random().toString(36).slice(2,9);
const today=()=>new Date().toISOString().slice(0,10);
function addDays(n){const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

const TIERS={hot:{label:"Hot",color:"var(--hot)"},warm:{label:"Warm",color:"var(--warm)"},cool:{label:"Cool",color:"var(--cool)"}};
const TIER_DAYS={hot:2,warm:4,cool:7};
const STATUS={
  new:{label:"New",color:"#4a4d55"},contacted:{label:"Contacted",color:"#4a6785"},
  talking:{label:"In convo",color:"#5C8AA6"},hold:{label:"Pencil-hold",color:"var(--hold)"},
  booked:{label:"Booked ✓",color:"var(--booked)"},lost:{label:"Lost",color:"var(--lost)"}
};
const FIELDS=["id","name","phone","tier","status","party","partyDate","lastTouch","nextFollow","quote","lostReason","updated"];

let leads=[], config={url:"",token:""}, filter="new", search="", openId=null, saveT=null, pushT=null;
function find(id){return leads.find(function(l){return l.id===id;});}

/* ---------- storage ---------- */
function loadLocal(){
  try{const v=localStorage.getItem(LKEY);if(v)leads=(JSON.parse(v)||[]).map(normalise);}catch(e){leads=[];}
  try{const c=localStorage.getItem(CKEY);if(c)config=Object.assign(config,JSON.parse(c));}catch(e){}
}
function saveLocal(){try{localStorage.setItem(LKEY,JSON.stringify(leads));}catch(e){}}
function saveConfig(){try{localStorage.setItem(CKEY,JSON.stringify(config));}catch(e){}}

function flag(msg){const f=document.getElementById("flag");f.textContent=msg||"saved";f.classList.add("show");clearTimeout(f._t);f._t=setTimeout(()=>f.classList.remove("show"),900);}

/* ---------- sync ---------- */
function setSync(state,txt){
  const dot=document.getElementById("syncDot"), t=document.getElementById("syncTxt");
  dot.className="syncdot"+(state?(" "+state):"");
  t.textContent=txt;
}
function refreshSyncLabel(){
  if(!config.url){setSync("","Local only");return;}
  setSync("ok","Synced");
}
async function pushToSheet(){
  if(!config.url)return;
  clearTimeout(pushT);
  pushT=setTimeout(async()=>{
    setSync("busy","Syncing…");
    try{
      await fetch(config.url,{method:"POST",mode:"no-cors",body:JSON.stringify({token:config.token,action:"save",leads:leads})});
      // no-cors responses are unreadable by design — a completed POST is success
      setSync("ok","Synced");
    }catch(e){ setSync("err","Sync failed"); }
  },600);
}
async function pullFromSheet(showStatus){
  if(!config.url)return false;
  const st=document.getElementById("cfgStatus");
  if(showStatus)st.textContent="Pulling…";
  setSync("busy","Syncing…");
  try{
    const res=await fetch(config.url+"?token="+encodeURIComponent(config.token)+"&t="+Date.now());
    const j=await res.json();
    if(j&&j.leads){
      leads=j.leads.map(normalise);
      saveLocal();render();
      setSync("ok","Synced");
      if(showStatus)st.textContent="Pulled "+leads.length+" leads from your Sheet ✓";
      return true;
    }
    if(showStatus)st.textContent=(j&&j.error)?("Error: "+j.error):"Nothing came back — check URL & token.";
    setSync("err","Sync error");
  }catch(e){
    if(showStatus)st.textContent="Couldn't reach the Sheet. Check the URL is the /exec link and the deployment is set to 'Anyone'.";
    setSync("err","Sync failed");
  }
  return false;
}
const DATE_FIELDS=["partyDate","lastTouch","nextFollow","updated"];
function cleanDate(v){
  if(!v)return "";
  v=String(v);
  if(/^\d{4}-\d{2}-\d{2}$/.test(v))return v;           // already clean
  const d=new Date(v);                                   // handles ISO "...T00:00:00.000Z" etc.
  if(isNaN(d))return "";                                 // unreadable → blank rather than garbage
  // use LOCAL components so UTC+2 doesn't shift the day
  const p=n=>String(n).padStart(2,"0");
  return d.getFullYear()+"-"+p(d.getMonth()+1)+"-"+p(d.getDate());
}
function normalise(o){
  const l={};FIELDS.forEach(f=>l[f]=(o[f]===undefined||o[f]===null)?"":String(o[f]));
  DATE_FIELDS.forEach(f=>l[f]=cleanDate(l[f]));
  if(!l.id)l.id=uid();
  if(!l.tier)l.tier="warm";
  if(!l.status)l.status="new";
  l.status=String(l.status).toLowerCase();   // fold case so 'New' from any source matches the 'new' stage
  l.tier=String(l.tier).toLowerCase();
  return l;
}

/* ---------- persistence entry ---------- */
function save(){
  saveLocal();        // write to device immediately — never lose a keystroke
  flag();
  clearTimeout(saveT);
  saveT=setTimeout(()=>{pushToSheet();},600);  // only the cloud sync is debounced
}
/* read EVERY field of a card straight from the screen and store it — the reliable save */
function commitCard(id){
  const l=find(id); if(!l) return;
  document.querySelectorAll('[data-f][data-id="'+id+'"]').forEach(function(el){
    l[el.dataset.f]=el.value;
  });
  l.updated=today();
  saveLocal();
  clearTimeout(saveT); saveT=setTimeout(function(){pushToSheet();},600);
  flag("Saved ✓");
  // refresh the header (name, tier dot, status pill) in place without wiping the form
  var anyField=document.querySelector('[data-f][data-id="'+id+'"]');
  var card=anyField&&anyField.closest('.lead');
  if(card){
    var nm=card.querySelector('.lname'); if(nm)nm.textContent=l.name||"(no name)";
    var dot=card.querySelector('.tierdot'); if(dot)dot.style.background=(TIERS[l.tier]||TIERS.cool).color;
    var s=STATUS[l.status]||STATUS.new; var pill=card.querySelector('.spill');
    if(pill){pill.textContent=s.label;pill.style.background=s.color+"22";pill.style.color=s.color;pill.style.borderColor=s.color+"55";}
  }
}

/* ---------- helpers ---------- */
function isDue(l){
  if(l.status==="booked"||l.status==="lost")return false;
  if(l.status==="new")return true;
  return l.nextFollow && l.nextFollow<=today();
}
function searchMatch(l){
  if(!search)return true;
  const q=search.toLowerCase();
  return [l.name,l.phone,l.party,l.quote,l.partyDate,l.lostReason,(STATUS[l.status]||{}).label]
    .some(v=>String(v||"").toLowerCase().includes(q));
}
function isWeb(l){ return String(l.id||"").indexOf("WEB-")===0; }
function stageMatch(l){
  if(l.id===openId)return true; // never hide the card being edited — changing its status must not eject it
  if(filter==="all")return true;
  if(filter==="due")return isDue(l);
  if(filter==="bookings")return l.status==="hold"||l.status==="booked";
  if(filter==="holds")return l.status==="hold";
  if(filter==="new")return l.status==="new";
  if(filter==="web")return isWeb(l);
  if(filter==="booked")return l.status==="booked";
  if(filter==="active")return l.status!=="booked"&&l.status!=="lost";
  if(filter==="lost")return l.status==="lost";
  return l.tier===filter;
}
function matchesFilter(l){ return stageMatch(l) && searchMatch(l); }

/* ---------- render ---------- */
function renderStats(){
  const total=leads.length, booked=leads.filter(l=>l.status==="booked").length,
    holds=leads.filter(l=>l.status==="hold").length, due=leads.filter(isDue).length,
    fresh=leads.filter(l=>l.status==="new").length;
  document.getElementById("stats").innerHTML=
    [["new",fresh,"New","new"],["due",due,"Due now","due"],["hold",holds,"Holds","holds"],["booked",booked,"Booked","booked"]]
    .map(([k,n,l,f])=>`<div class="stat ${filter===f?'on':''}${k==="new"&&n>0?' alert':''}" data-filter="${f}">${k==="new"&&n>0?'<span class="bell">'+n+'</span>':''}<div class="n" style="color:${k==="new"?'var(--red)':k==="due"?'var(--red)':k==="booked"?'var(--booked)':k==="hold"?'var(--hold)':'var(--ink)'}">${n}</div><div class="l">${l}</div></div>`).join("");
}
function renderChips(){
  const act=l=>l.status!=="booked"&&l.status!=="lost";
  const counts={
    due:leads.filter(isDue).length,
    hot:leads.filter(l=>l.tier==="hot"&&act(l)).length,
    warm:leads.filter(l=>l.tier==="warm"&&act(l)).length,
    cool:leads.filter(l=>l.tier==="cool"&&act(l)).length,
    bookings:leads.filter(l=>l.status==="hold"||l.status==="booked").length,
    active:leads.filter(act).length,
    lost:leads.filter(l=>l.status==="lost").length,
    web:leads.filter(isWeb).length,
    all:leads.length
  };
  const chips=[["web","Web"],["due","Due"],["hot","Hot"],["warm","Warm"],["cool","Cool"],["bookings","Bookings"],["active","Active"],["lost","Lost"],["all","All"]];
  document.getElementById("chips").innerHTML=chips.map(([k,label])=>
    `<button class="chip ${filter===k?'on':''}" data-filter="${k}">${label}<span class="c">${counts[k]}</span></button>`).join("");
}
function dueLabel(l){
  if(l.status==="new"&&!l.lastTouch)return `<span class="due">Needs first touch</span>`;
  if((l.status==="hold"||l.status==="booked")&&l.partyDate)return `Party: ${l.partyDate}`;
  if(!l.nextFollow)return "";
  const t=today();
  if(l.nextFollow<t)return `<span class="due">Overdue · follow up</span>`;
  if(l.nextFollow===t)return `<span class="due">Follow up today</span>`;
  return `Next: ${l.nextFollow}`;
}
function renderList(){
  const list=leads.filter(matchesFilter).sort((a,b)=>{
    if(filter==="bookings"){return (a.partyDate||"9999").localeCompare(b.partyDate||"9999");}
    const order={hot:0,warm:1,cool:2};
    const ad=isDue(a)?0:1, bd=isDue(b)?0:1;
    if(ad!==bd)return ad-bd;
    return (order[a.tier]??9)-(order[b.tier]??9);
  });
  const el=document.getElementById("list");
  if(!list.length){el.innerHTML=`<div class="empty">${leads.length?"Nothing in this view. Try another filter.":"No leads yet. Tap <b>+ Add lead</b> to log your first one."}</div>`;return;}
  el.innerHTML=list.map(l=>{
    const t=TIERS[l.tier]||TIERS.cool, s=STATUS[l.status]||STATUS.new, open=l.id===openId;
    const ph=String(l.phone||"").replace(/[^0-9]/g,"");
    const showLost=l.status==="lost";
    return `<div class="lead ${isDue(l)?'due':''} ${open?'open':''}">
      <div class="lhead" data-act="toggle" data-id="${l.id}">
        <span class="tierdot" style="background:${t.color}"></span>
        <span class="lname">${esc(l.name)||"(no name)"}</span>
        <span class="spill" style="background:${s.color}22;color:${s.color};border:1px solid ${s.color}55">${s.label}</span>
        ${isWeb(l)?`<span class="srcbadge">Website</span>`:""}
      </div>
      <div class="lmeta">
        ${l.party?`<span class="party">${esc(l.party)}</span>`:""}
        <span>${dueLabel(l)}</span>
        ${l.lastTouch?`<span>Last: ${l.lastTouch}</span>`:""}
      </div>
      <div class="edit">
        <div class="row2">
          <div class="fld"><label>Name</label><input value="${esc(l.name)}" data-f="name" data-id="${l.id}"></div>
          <div class="fld"><label>Phone</label><input value="${esc(l.phone)}" data-f="phone" data-id="${l.id}" placeholder="2677..."></div>
        </div>
        <div class="row2">
          <div class="fld"><label>Tier</label><select data-f="tier" data-id="${l.id}">
            ${Object.entries(TIERS).map(([k,v])=>`<option value="${k}" ${l.tier===k?'selected':''}>${v.label}</option>`).join("")}
          </select></div>
          <div class="fld"><label>Status</label><select data-f="status" data-id="${l.id}">
            ${Object.entries(STATUS).map(([k,v])=>`<option value="${k}" ${l.status===k?'selected':''}>${v.label}</option>`).join("")}
          </select></div>
        </div>
        <div class="fld" style="margin-bottom:9px"><label>Party details (age · players · venue)</label>
          <textarea data-f="party" data-id="${l.id}" placeholder="e.g. 9-12 · up to 10 · Tlokweng">${esc(l.party)}</textarea></div>
        <div class="row2">
          <div class="fld"><label>Quote (P)</label><input value="${esc(l.quote)}" data-f="quote" data-id="${l.id}" placeholder="2500"></div>
          <div class="fld"><label>Party date</label><input type="date" value="${l.partyDate||''}" data-f="partyDate" data-id="${l.id}"></div>
        </div>
        ${showLost?`<div class="fld" style="margin-bottom:9px"><label>Lost reason</label><input value="${esc(l.lostReason)}" data-f="lostReason" data-id="${l.id}" placeholder="e.g. price / went elsewhere / no reply"></div>`:""}
        <div class="row2">
          <div class="fld"><label>Last touch</label><input type="date" value="${l.lastTouch||''}" data-f="lastTouch" data-id="${l.id}"></div>
          <div class="fld"><label>Next follow-up</label><input type="date" value="${l.nextFollow||''}" data-f="nextFollow" data-id="${l.id}"></div>
        </div>
        <div class="actrow">
          <button class="btn save" data-act="save" data-id="${l.id}">💾 Save</button>
          <button class="btn done" data-act="done" data-id="${l.id}">Save &amp; close</button>
        </div>
        <div class="actrow">
          ${ph?`<a class="btn wa" href="https://wa.me/${ph}" target="_blank" rel="noopener">WhatsApp</a>`:""}
          <button class="btn touch" data-act="touch" data-id="${l.id}">Logged a touch</button>
        </div>
        <div class="actrow">
          <button class="btn ghost" data-act="booked" data-id="${l.id}">Mark booked ✓</button>
          <button class="btn del" data-act="del" data-id="${l.id}">Delete</button>
        </div>
      </div>
    </div>`;
  }).join("");
}
function render(){renderStats();renderChips();renderList();refreshSyncLabel();}

/* ---------- events ---------- */
document.getElementById("addBtn").addEventListener("click",()=>{
  const l=normalise({id:uid(),tier:"warm",status:"new"});
  leads.unshift(l);openId=l.id;filter="all";save();render();
  window.scrollTo({top:0,behavior:"smooth"});
});
document.body.addEventListener("click",e=>{
  const chip=e.target.closest("[data-filter]");
  if(chip){if(openId)commitCard(openId);filter=chip.dataset.filter;openId=null;render();return;}
  const b=e.target.closest("[data-act]");if(!b)return;
  const act=b.dataset.act,id=b.dataset.id;
  if(act==="toggle"){openId=openId===id?null:id;render();}
  else if(act==="save"){commitCard(id);}
  else if(act==="done"){commitCard(id);const l=find(id);
    if(l&&!l.name&&!l.phone&&!l.party){leads=leads.filter(x=>x.id!==id);}
    openId=null;render();}
  else if(act==="touch"){commitCard(id);const l=find(id);l.lastTouch=today();if(l.status==="new")l.status="contacted";
    l.nextFollow=addDays(TIER_DAYS[l.tier]||4);l.updated=today();save();render();}
  else if(act==="booked"){commitCard(id);const l=find(id);l.status="booked";l.updated=today();save();render();}
  else if(act==="del"){const l=find(id);if(confirm(`Delete ${l.name||"this lead"}?`)){leads=leads.filter(x=>x.id!==id);save();render();}}
});
document.body.addEventListener("input",e=>{
  const f=e.target.closest("[data-f]");if(!f)return;const l=find(f.dataset.id);if(!l)return;
  l[f.dataset.f]=f.value;l.updated=today();save();
  // reflect the name in the card header live, without a re-render that would wipe fields
  if(f.dataset.f==="name"){
    const card=f.closest(".lead"); const nm=card&&card.querySelector(".lname");
    if(nm)nm.textContent=f.value||"(no name)";
  }
});
document.body.addEventListener("change",e=>{
  const f=e.target.closest("[data-f]");if(!f)return;const l=find(f.dataset.id);if(!l)return;
  // selects on iOS fire 'change' but not 'input' — save the value here so it persists
  l[f.dataset.f]=f.value;l.updated=today();save();
  // status/tier changes affect labels & colours — safe to re-render now that every field saves on input
  if(f.dataset.f==="status"||f.dataset.f==="tier"){render();}
});

/* ---------- settings ---------- */
const overlay=document.getElementById("overlay");
document.getElementById("syncBtn").addEventListener("click",()=>{
  document.getElementById("cfgUrl").value=config.url||"";
  document.getElementById("cfgToken").value=config.token||"";
  document.getElementById("cfgStatus").textContent=config.url?"Connected.":"Not connected — app is local-only.";
  overlay.classList.add("on");
});
document.getElementById("cfgClose").addEventListener("click",()=>overlay.classList.remove("on"));
overlay.addEventListener("click",e=>{if(e.target===overlay)overlay.classList.remove("on");});
document.getElementById("cfgSave").addEventListener("click",async()=>{
  config.url=document.getElementById("cfgUrl").value.trim();
  config.token=document.getElementById("cfgToken").value.trim();
  saveConfig();
  document.getElementById("cfgStatus").textContent="Saved. Testing connection…";
  if(config.url){
    const ok=await pullFromSheet(true);
    if(ok){ await pushToSheet(); }
  }else{ document.getElementById("cfgStatus").textContent="Cleared — now local-only."; }
  refreshSyncLabel();
});
document.getElementById("cfgPull").addEventListener("click",()=>{
  config.url=document.getElementById("cfgUrl").value.trim();
  config.token=document.getElementById("cfgToken").value.trim();
  saveConfig();
  if(confirm("Pull from the Sheet? This replaces what's on this device with the Sheet's copy."))pullFromSheet(true);
});

/* ---------- boot ---------- */
loadLocal();render();
if(config.url)pullFromSheet(false);

/* ---------- search ---------- */
(function(){
  var box=document.getElementById("searchBox"), clr=document.getElementById("searchClear"),
      bar=box&&box.closest(".searchbar");
  if(!box)return;
  var t=null;
  box.addEventListener("input",function(){
    bar.classList.toggle("has",!!box.value);
    clearTimeout(t);
    t=setTimeout(function(){ search=box.value.trim(); render(); },120);
  });
  clr.addEventListener("click",function(){
    box.value=""; search=""; bar.classList.remove("has"); render(); box.focus();
  });
})();
</script>
</body>
</html>
